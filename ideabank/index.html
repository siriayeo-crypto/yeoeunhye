<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>아이디어 뱅크 v2.0 — 여은혜</title>
    <!-- Tailwind CSS & Lucide Icons & React -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #F5F3EE; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .toast-active { opacity: 1 !important; transform: translateY(0) !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 아이콘 컴포넌트 래퍼
        const Icon = ({ name, size = 20, className = "" }) => {
            const [iconSvg, setIconSvg] = useState("");
            useEffect(() => {
                if (window.lucide) {
                    const svg = window.lucide.createIcons();
                }
            }, []);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        const App = () => {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false);
            const [apiUrl, setApiUrl] = useState(localStorage.getItem('ib_api_url') || '');
            const [adminPass, setAdminPass] = useState(localStorage.getItem('ib_admin_pass') || '1234');
            
            const [activeModal, setActiveModal] = useState(null);
            const [selectedIdea, setSelectedIdea] = useState(null);
            const [selectedCatId, setSelectedCatId] = useState(null);
            const [toastMsg, setToastMsg] = useState("");

            useEffect(() => {
                if (apiUrl) loadData();
            }, []);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [data, isAdmin, activeModal]);

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(""), 2000);
            };

            const loadData = async () => {
                if (!apiUrl) return;
                setLoading(true);
                try {
                    const res = await fetch(`${apiUrl}?action=load`);
                    const json = await res.json();
                    setData(Array.isArray(json) ? json : []);
                } catch (e) {
                    showToast("데이터 로드 실패");
                } finally {
                    setLoading(false);
                }
            };

            const saveData = async (newData) => {
                if (!apiUrl) return;
                setLoading(true);
                try {
                    await fetch(apiUrl, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'save', data: newData })
                    });
                    setData(newData);
                    showToast("저장되었습니다");
                } catch (e) {
                    showToast("저장 실패");
                } finally {
                    setLoading(false);
                }
            };

            const handleAdminToggle = () => {
                if (isAdmin) {
                    setIsAdmin(false);
                    showToast("읽기 모드 전환");
                } else {
                    const pass = prompt("관리자 비밀번호를 입력하세요:");
                    if (pass === adminPass) {
                        setIsAdmin(true);
                        showToast("관리자 인증 성공");
                    } else {
                        showToast("비밀번호 오류");
                    }
                }
            };

            const addCategory = () => {
                const title = prompt("새 카테고리 이름:");
                if (!title) return;
                const newCat = {
                    id: 'cat_' + Date.now(),
                    title,
                    color: `hsl(${Math.random() * 360}, 70%, 60%)`,
                    ideas: []
                };
                saveData([...data, newCat]);
            };

            const addIdea = (catId) => {
                const input = document.getElementById(`input-${catId}`);
                const name = input.value;
                if (!name) return;
                
                const newData = data.map(cat => {
                    if (cat.id === catId) {
                        return {
                            ...cat,
                            ideas: [...cat.ideas, {
                                id: 'id_' + Date.now(),
                                name,
                                ai: false,
                                status: '미완성',
                                level: 1,
                                aiName: '',
                                createdAt: new Date().toLocaleDateString(),
                                completedAt: ''
                            }]
                        };
                    }
                    return cat;
                });
                input.value = '';
                saveData(newData);
            };

            const deleteIdea = (e, catId, ideaId) => {
                e.stopPropagation();
                if(!confirm("삭제하시겠습니까?")) return;
                const newData = data.map(cat => {
                    if (cat.id === catId) {
                        return { ...cat, ideas: cat.ideas.filter(i => i.id !== ideaId) };
                    }
                    return cat;
                });
                saveData(newData);
            };

            const moveIdea = (e, catId, index, direction) => {
                e.stopPropagation();
                const newData = [...data];
                const cat = newData.find(c => c.id === catId);
                const newIdx = index + direction;
                if (newIdx < 0 || newIdx >= cat.ideas.length) return;
                const [moved] = cat.ideas.splice(index, 1);
                cat.ideas.splice(newIdx, 0, moved);
                saveData(newData);
            };

            return (
                <div className="min-h-screen pb-24">
                    {/* Header */}
                    <header className="sticky top-0 bg-white/80 backdrop-blur-md border-b border-gray-200 z-40 px-4 py-4 flex justify-between items-center">
                        <div>
                            <h1 className="text-xl font-bold flex items-center gap-2">
                                <i data-lucide="brain" className="text-blue-600"></i> 아이디어 뱅크
                            </h1>
                            <p className="text-[10px] text-gray-400 font-mono">IDEABANK SYSTEM V2.0</p>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setActiveModal('settings')} className="p-2 text-gray-400 hover:bg-gray-100 rounded-full">
                                <i data-lucide="settings"></i>
                            </button>
                            <button 
                                onClick={handleAdminToggle}
                                className={`flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-bold transition-all ${isAdmin ? 'bg-blue-600 text-white shadow-lg' : 'bg-white border border-gray-200 text-gray-600'}`}
                            >
                                <i data-lucide={isAdmin ? "unlock" : "lock"} style={{width: 14}}></i>
                                {isAdmin ? 'ADMIN' : 'READ ONLY'}
                            </button>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="p-4 max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-4">
                        {isAdmin && (
                            <button onClick={addCategory} className="border-2 border-dashed border-gray-300 rounded-3xl p-10 flex flex-col items-center justify-center text-gray-400 hover:border-blue-500 hover:text-blue-500 transition-all bg-white/50 group">
                                <i data-lucide="plus" className="mb-2 group-hover:scale-110 transition-transform"></i>
                                <span className="font-bold">새 카테고리 추가</span>
                            </button>
                        )}

                        {data.map(cat => (
                            <div key={cat.id} className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden flex flex-col h-full min-h-[400px]">
                                <div className="p-5 flex justify-between items-center border-b border-gray-50">
                                    <div className="flex items-center gap-3">
                                        <div className="w-4 h-4 rounded-full shadow-inner" style={{backgroundColor: cat.color}}></div>
                                        <h3 className="font-bold text-lg">{cat.title}</h3>
                                        <span className="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-bold">{cat.ideas.length}</span>
                                    </div>
                                    {isAdmin && (
                                        <button onClick={() => {if(confirm("카테고리를 삭제할까요?")) saveData(data.filter(c => c.id !== cat.id))}} className="text-gray-200 hover:text-red-400">
                                            <i data-lucide="trash-2" style={{width: 18}}></i>
                                        </button>
                                    )}
                                </div>

                                <div className="flex-1 p-3 space-y-2 overflow-y-auto hide-scrollbar max-h-[500px]">
                                    {cat.ideas.map((idea, idx) => (
                                        <div 
                                            key={idea.id} 
                                            onClick={() => { setSelectedCatId(cat.id); setSelectedIdea({...idea}); setActiveModal('idea_detail'); }}
                                            className="group flex items-center justify-between p-4 rounded-2xl bg-gray-50/50 hover:bg-white hover:shadow-md border border-transparent hover:border-gray-100 transition-all cursor-pointer"
                                        >
                                            <div className="flex items-center gap-3 flex-1">
                                                <div className={`w-2 h-2 rounded-full ${idea.status === '완료' ? 'bg-green-500' : idea.status === '작업중' ? 'bg-blue-500' : 'bg-gray-300'}`}></div>
                                                <div>
                                                    <div className={`text-sm font-bold ${idea.status === '완료' ? 'line-through text-gray-400' : 'text-gray-800'}`}>
                                                        {idea.name}
                                                    </div>
                                                    <div className="flex gap-2 mt-1">
                                                        {idea.ai && <span className="text-[8px] bg-purple-600 text-white px-1.5 py-0.5 rounded-md font-black">AI</span>}
                                                        <span className="text-[9px] text-gray-400 font-medium">난이도 {idea.level}</span>
                                                    </div>
                                                </div>
                                            </div>
                                            {isAdmin && (
                                                <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <div className="flex flex-col">
                                                        <button onClick={(e) => moveIdea(e, cat.id, idx, -1)} className="p-1 hover:text-blue-600 text-gray-300"><i data-lucide="chevron-up" style={{width: 14}}></i></button>
                                                        <button onClick={(e) => moveIdea(e, cat.id, idx, 1)} className="p-1 hover:text-blue-600 text-gray-300"><i data-lucide="chevron-down" style={{width: 14}}></i></button>
                                                    </div>
                                                    <button onClick={(e) => deleteIdea(e, cat.id, idea.id)} className="p-2 text-gray-300 hover:text-red-500"><i data-lucide="trash-2" style={{width: 16}}></i></button>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>

                                {isAdmin && (
                                    <div className="p-4 bg-gray-50/80 border-t border-gray-100">
                                        <div className="flex gap-2 bg-white p-1 rounded-2xl border border-gray-200 focus-within:ring-2 ring-blue-100 transition-all">
                                            <input 
                                                id={`input-${cat.id}`}
                                                className="flex-1 bg-transparent px-3 py-2 text-sm outline-none"
                                                placeholder="새로운 아이디어 구상..."
                                                onKeyDown={(e) => e.key === 'Enter' && addIdea(cat.id)}
                                            />
                                            <button onClick={() => addIdea(cat.id)} className="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-xs shadow-sm shadow-blue-200">추가</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ))}
                    </main>

                    {/* Settings Modal */}
                    {activeModal === 'settings' && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-md z-[60] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-xl font-black">시스템 설정</h2>
                                    <button onClick={() => setActiveModal(null)} className="p-2 hover:bg-gray-100 rounded-full"><i data-lucide="x"></i></button>
                                </div>
                                <div className="space-y-6">
                                    <div>
                                        <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-2 px-1">API Endpoint URL</label>
                                        <input className="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-4 text-xs font-mono" value={apiUrl} onChange={(e) => {setApiUrl(e.target.value); localStorage.setItem('ib_api_url', e.target.value);}} />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-2 px-1">Admin Password</label>
                                        <input type="password" className="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-4 text-xs font-mono" value={adminPass} onChange={(e) => {setAdminPass(e.target.value); localStorage.setItem('ib_admin_pass', e.target.value);}} />
                                    </div>
                                    <button onClick={() => {setActiveModal(null); loadData();}} className="w-full bg-black text-white py-5 rounded-[24px] font-black hover:scale-[1.02] active:scale-95 transition-all shadow-xl shadow-gray-200">설정 적용하기</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Idea Detail Modal */}
                    {activeModal === 'idea_detail' && selectedIdea && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-md z-[60] flex items-end sm:items-center justify-center">
                            <div className="bg-white w-full max-w-lg rounded-t-[40px] sm:rounded-[40px] p-8 shadow-2xl max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-8">
                                    <span className="bg-gray-100 px-3 py-1 rounded-full text-[10px] font-bold text-gray-500 uppercase tracking-tighter">Idea Details</span>
                                    <button onClick={() => setActiveModal(null)} className="p-2 hover:bg-gray-100 rounded-full"><i data-lucide="x"></i></button>
                                </div>
                                
                                <div className="space-y-8">
                                    <input 
                                        disabled={!isAdmin}
                                        className="w-full text-2xl font-black outline-none bg-transparent placeholder-gray-200"
                                        value={selectedIdea.name}
                                        onChange={(e) => setSelectedIdea({...selectedIdea, name: e.target.value})}
                                    />

                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest block px-1">현재 상태</label>
                                            <select 
                                                disabled={!isAdmin}
                                                className="w-full bg-gray-50 border-none rounded-2xl px-4 py-4 font-bold text-sm"
                                                value={selectedIdea.status}
                                                onChange={(e) => {
                                                    const s = e.target.value;
                                                    setSelectedIdea({...selectedIdea, status: s, completedAt: s === '완료' ? new Date().toLocaleDateString() : ''});
                                                }}
                                            >
                                                <option value="미완성">미완성</option>
                                                <option value="작업중">작업 중</option>
                                                <option value="완료">완료됨</option>
                                            </select>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest block px-1">난이도 (1-5)</label>
                                            <div className="flex gap-1 h-[52px]">
                                                {[1,2,3,4,5].map(lv => (
                                                    <button 
                                                        key={lv}
                                                        onClick={() => isAdmin && setSelectedIdea({...selectedIdea, level: lv})}
                                                        className={`flex-1 rounded-xl font-black text-xs transition-all ${selectedIdea.level >= lv ? 'bg-yellow-400 text-white' : 'bg-gray-100 text-gray-300'}`}
                                                    >
                                                        {lv}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="p-6 bg-purple-50 rounded-[32px] border border-purple-100">
                                        <div className="flex items-center justify-between mb-4">
                                            <div className="flex items-center gap-2 text-purple-700 font-black text-sm">
                                                <i data-lucide="sparkles" style={{width: 16}}></i> AI ENGINE
                                            </div>
                                            <input 
                                                type="checkbox" 
                                                className="w-6 h-6 accent-purple-600 rounded-lg" 
                                                checked={selectedIdea.ai}
                                                disabled={!isAdmin}
                                                onChange={(e) => setSelectedIdea({...selectedIdea, ai: e.target.checked})}
                                            />
                                        </div>
                                        {selectedIdea.ai && (
                                            <input 
                                                disabled={!isAdmin}
                                                className="w-full bg-white border border-purple-100 rounded-xl px-4 py-3 text-sm outline-none placeholder-purple-300"
                                                placeholder="사용할 모델명 (ex: Claude 3.5 Sonnet)"
                                                value={selectedIdea.aiName}
                                                onChange={(e) => setSelectedIdea({...selectedIdea, aiName: e.target.value})}
                                            />
                                        )}
                                    </div>

                                    <div className="grid grid-cols-2 gap-3 text-[10px] font-bold">
                                        <div className="bg-gray-50 px-4 py-3 rounded-2xl">
                                            <div className="text-gray-400 mb-1">CREATED</div>
                                            <div className="text-gray-600">{selectedIdea.createdAt || '-'}</div>
                                        </div>
                                        <div className="bg-gray-50 px-4 py-3 rounded-2xl">
                                            <div className="text-gray-400 mb-1">COMPLETED</div>
                                            <div className="text-gray-600 font-mono text-blue-600">{selectedIdea.completedAt || 'PROCEEDING...'}</div>
                                        </div>
                                    </div>

                                    {isAdmin && (
                                        <button 
                                            onClick={() => {
                                                const newData = data.map(cat => {
                                                    if (cat.id === selectedCatId) {
                                                        return { ...cat, ideas: cat.ideas.map(i => i.id === selectedIdea.id ? selectedIdea : i) };
                                                    }
                                                    return cat;
                                                });
                                                saveData(newData);
                                                setActiveModal(null);
                                            }}
                                            className="w-full bg-blue-600 text-white py-5 rounded-[24px] font-black shadow-xl shadow-blue-100 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2"
                                        >
                                            <i data-lucide="save"></i> 변경사항 저장하기
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Status Indicator */}
                    <div className="fixed bottom-6 right-6 z-50 flex items-center gap-3">
                        {loading && (
                            <div className="bg-black text-white px-4 py-2 rounded-full text-[10px] font-black tracking-widest flex items-center gap-2 shadow-2xl animate-pulse">
                                <div className="w-1.5 h-1.5 bg-blue-500 rounded-full animate-ping"></div> SYNCING
                            </div>
                        )}
                        <div id="toast" className={`bg-black text-white px-6 py-3 rounded-2xl text-sm font-bold shadow-2xl transition-all duration-300 opacity-0 translate-y-4 ${toastMsg ? 'toast-active' : ''}`}>
                            {toastMsg}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
